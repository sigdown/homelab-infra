---
# tasks file for roles/docker
- name: Install Docker and dependencies
  ansible.builtin.apt:
    name: 
      - docker.io
      - docker-compose-v2
      - python3-docker
    state: present
    update_cache: yes

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: "{{ new_user }}"
    groups: docker
    append: yes
